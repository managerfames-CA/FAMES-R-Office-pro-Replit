kind = "web"
previewPath = "/"
title = "Office Control"
version = "1.0.0"
id = "artifacts/office-control"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23917

[services.development]
run = "npm run dev"

[services.production]
build = [ "npm", "run", "build" ]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23917"
BASE_PATH = "/"
